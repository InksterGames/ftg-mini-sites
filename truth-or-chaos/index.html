  u.push(idx);currentQ=pool[idx];
  
  const card=document.getElementById('card'), label=document.getElementById('cardLabel');
  label.textContent=mode.toUpperCase();label.className='card-label '+mode+'-label';
  document.getElementById('cardText').textContent=currentQ;
  document.getElementById('cardCategory').textContent=cat.toUpperCase()+' MODE';

  // Card draw animation — flips in from below
  const tl=gsap.timeline();
  tl.set(card,{opacity:0,scale:0.85,y:30,rotationX:15});
  tl.to(card,{opacity:1,scale:1,y:0,rotationX:0,duration:0.5,ease:'back.out(1.4)'});
  tl.fromTo('.card-label',{opacity:0,y:-8},{opacity:1,y:0,duration:0.3,ease:'power2.out'},'-=0.2');
  tl.fromTo('.card-text',{opacity:0,y:10},{opacity:1,y:0,duration:0.35,ease:'power2.out'},'-=0.15');
  tl.fromTo('.card-category',{opacity:0},{opacity:1,duration:0.3},'-=0.1');
  
  // Draw button pulse
  gsap.fromTo('#drawBtn',{scale:1},{scale:1.03,duration:0.2,yoyo:true,repeat:1,ease:'power2.out'});
  
  updateCount();
  track('draw',cat,mode);
}

function shareResult(){
  if(!currentQ)return;
  const t=`${mode.toUpperCase()}: ${currentQ}\n\nPlaying Truth or Chaos — FTG edition. Your turn: https://truthorchaos.f--kthegame.com`;
  if(navigator.share){navigator.share({title:'Truth or Chaos',text:t,url:'https://truthorchaos.f--kthegame.com'})}
  else{navigator.clipboard.writeText(t);showToast("Copied! Share it 🔥")}
  track('share',cat,mode);
}

function showToast(msg){
  const el=document.getElementById('toast');el.textContent=msg;
  gsap.to(el,{opacity:1,duration:0.3,y:-10,ease:'power2.out'});
  gsap.to(el,{opacity:0,duration:0.3,delay:2,y:0,ease:'power2.in'});
}

function track(a,c,m){if(typeof gtag!=='undefined')gtag('event',a,{event_category:c,event_label:m})}
function trackCTA(){if(typeof gtag!=='undefined')gtag('event','cta_click',{event_category:'conversion',event_label:'ftg_deck'})}

document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>selCat(p.dataset.cat)));
document.querySelectorAll('.choice-btn').forEach(b=>b.addEventListener('click',()=>selMode(b.dataset.mode)));

// Entrance animation
window.addEventListener('DOMContentLoaded',()=>{
  const tl=gsap.timeline();
  tl.fromTo('#header',{opacity:0,y:-20},{opacity:1,y:0,duration:0.6,ease:'power3.out'});
  tl.fromTo('#cats',{opacity:0,y:12},{opacity:1,y:0,duration:0.5,ease:'power2.out'},'-=0.25');
  tl.fromTo('#choices',{opacity:0,y:8},{opacity:1,y:0,duration:0.4,ease:'power2.out'},'-=0.2');
  tl.fromTo('#counter',{opacity:0},{opacity:1,duration:0.3},'-=0.15');
  tl.fromTo('#drawBtn',{opacity:0,scale:0.9,y:10},{opacity:1,scale:1,y:0,duration:0.5,ease:'back.out(1.4)'},'-=0.1');
  tl.fromTo('#cta',{opacity:0,y:10},{opacity:1,y:0,duration:0.5,ease:'power2.out'},'-=0.2');
  updateCount();
});
