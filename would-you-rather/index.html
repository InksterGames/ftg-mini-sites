<div class="container">

  <div class="pill-scroll" id="cats">

  </div>

  <div class="counter" id="counter">200+ questions ready</div>

  <button class="generate-btn" id="genBtn" onclick="draw()">Generate Question</button>

  <div class="card" id="card" style="opacity:0; transform:scale(0.9)">
    <div class="card-label">WOULD YOU RATHER</div>
    <div class="card-question" id="cardQuestion">Pick a category and hit Generate</div>
    <div class="option-row" id="options" style="display:none">
      <button class="option opt-a" id="optA" onclick="pick('a')">Option A</button>
      <button class="option opt-b" id="optB" onclick="pick('b')">Option B</button>
    </div>
  </div>

  <div class="action-row" id="actions">
    <button class="action-btn" onclick="draw()">New Question</button>
    <button class="action-btn primary" onclick="shareResult()">Share</button>
  </div>

  <div class="cta-bar" id="cta">
    <a href="https://www.f--kthegame.com" target="_blank" rel="noopener" onclick="trackCTA()">Enjoyed the dilemmas? There's a card game that makes deciding between these look easy →</a>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>

  "only have sex with the lights on... OR only with the lights off, forever?",
  "your partner be incredibly loud... OR completely silent?",
  "accidentally send a spicy photo to your boss... OR to your parents?",
  "have terrible sex with someone ridiculously hot... OR amazing sex with someone you're not attracted to?",
  "your sex life be broadcast as a reality show... OR your finances?",
  "get walked in on by your parents... OR walk in on your parents?",
  "accidentally like your ex's photo from 2017... OR accidentally send a thirst DM to your boss?",
  "be unbelievably good looking but terrible in bed... OR average looking but legendary?",
  "narrate everything during sex like a nature documentary... OR only speak in baby talk?",
  "find out your partner has a secret OF account... OR a secret gambling debt?",
  "have vanilla sex for life with your soulmate... OR wild sex with randoms but never find love?",
  "be caught doing the walk of shame by your entire extended family... OR your entire workplace?",
  "your partner calls out the wrong name... OR has no reaction at all?",
  "be the best someone's ever had but they never tell you... OR be the worst but they lie and say you're amazing?",
  "your parents read your spicy DMs... OR your spicy DMs get leaked to a small gossipy group chat?",
  "have to give a detailed recap of your last hookup to this room... OR show your last 10 liked posts?",
  "have a ridiculously high body count everyone knows about... OR be a virgin but everyone thinks you've slept with 100 people?",
  "only get turned on by spreadsheets... OR only by clowns?",
  "your partner be into roleplay but it's always very cringe... OR completely unadventurous but very intense?",
  "find someone's spicy photos on a friend's phone... OR have a friend find yours?"
],party:[
  "be the drunkest person at the party... OR the most sober?",
  "do a body shot off a stranger... OR let a stranger do one off you?",
  "accidentally send a risky text to your boss... OR your mum?",
  "sing karaoke sober... OR give a speech drunk?",
  "be the first person to arrive at a party... OR the last person to leave?",
  "be known as the person who always cries when drunk... OR always fights when drunk?",
  "have your search history shown to this room... OR your camera roll?",
  "do 5 shots back to back... OR streak through the backyard?",
  "let a stranger go through your phone for 2 minutes... OR give a stranger your number?",
  "throw up at the party and rally... OR go home early and miss the best part?",
  "do a trust fall off a chair blindfolded... OR eat a raw onion for 30 seconds?",
  "be dared to make out with the person on your left... OR tell them your most embarrassing secret?",
  "re-enact your first kiss in front of everyone... OR show everyone your worst photo?",
  "be the person who starts the drama... OR the person who has to fix it?",
  "take a shot every time someone says your name... OR every time you check your phone?",
  "do the cinnamon challenge... OR eat a whole raw onion?",
  "shotgun two drinks back to back... OR do a keg stand?",
  "wear your clothes inside out for the rest of the night... OR speak only in an accent until sunrise?",
  "post a crying selfie with 'life is beautiful'... OR post a thirst trap tagging your boss?",
  "let someone draw on your face... OR shave a strip of your hair?"
],dark:[
  "know the exact date of your death... OR the exact cause?",
  "relive your worst day once a year... OR forget your happiest memory?",
  "be completely alone for the rest of your life... OR surrounded by people who secretly hate you?",
  "save one family member from certain death... OR save five strangers?",
  "be wrongly convicted of a crime... OR have someone you love be wrongly convicted?",
  "know what everyone truly thinks of you... OR have no one know what you truly think?",
  "die in 10 years having lived fully... OR live to 90 in complete mediocrity?",
  "be completely forgotten within a year of death... OR remembered for the worst thing you ever did?",
  "experience the death of everyone you love... OR die before any of them?",
  "lose all your memories but keep your identity... OR lose your identity but keep your memories?",
  "be the cause of a tragedy that kills strangers... OR witness a tragedy that kills your loved ones?",
  "always know when someone will die... OR always know who will betray you?",
  "live through a zombie apocalypse alone... OR a nuclear winter with strangers?",
  "press a button that kills someone random... OR someone presses it and kills you?",
  "your biggest secret exposed to everyone you know... OR someone else's secret costs them everything?",
  "know the world will end in exactly one year... OR never know when it ends?",
  "be the last human alive... OR the first human to die in the apocalypse?",
  "read minds but can't turn it off... OR be unable to tell when people lie?",
  "be forced to betray your best friend... OR have them betray you?",
  "find out your whole life has been a simulation... OR find out you're the only real person?"
],couples:[
  "your partner be best friends with their ex... OR hate all their exes and talk about it constantly?",
  "find out your partner has a secret savings account... OR a secret credit card?",
  "have a partner who is extremely jealous... OR one who doesn't care at all?",
  "your partner reads your DMs... OR your search history?",
  "have wild sex but zero emotional connection... OR deep connection but boring sex?",
  "be the one who loves more... OR be loved more?",

],impossible:[

let cat='funny', currentQ='', used={};
Object.keys(WYR).forEach(k=>used[k]=[]);

function selCat(c){
  cat=c;document.querySelectorAll('#cats .pill').forEach(p=>{p.className='pill';if(p.dataset.cat===c)p.classList.add('active-'+c)});
  document.getElementById('cat'+c)?.scrollIntoView?.({behavior:'smooth',block:'nearest',inline:'center'});
  gsap.fromTo('#cats .pill.active-'+c,{scale:0.9},{scale:1,duration:0.35,ease:'back.out(1.7)'});
  updateCount();
  document.getElementById('cardQuestion').textContent='Pick a category and hit Generate';
  document.getElementById('options').style.display='none';
}
function updateCount(){
  const pool=WYR[cat],rem=pool.length-(used[cat]||[]).length;
  document.getElementById('counter').textContent=rem+' questions in this category';
}

function draw(){
  const pool=WYR[cat],u=used[cat];
  const avail=pool.filter((_,i)=>!u.includes(i));
  if(!avail.length){used[cat]=[];setTimeout(draw,300);return;}
  const idx=pool.indexOf(avail[Math.floor(Math.random()*avail.length)]);
  u.push(idx);currentQ=pool[idx];

  document.getElementById('cardQuestion').textContent='would you rather... '+currentQ;
  document.getElementById('options').style.display='flex';
  document.getElementById('optA').className='option opt-a';
  document.getElementById('optB').className='option opt-b';

  const card=document.getElementById('card');
  const tl=gsap.timeline();
  tl.set(card,{opacity:0,scale:0.88,y:20});
  tl.to(card,{opacity:1,scale:1,y:0,duration:0.5,ease:'back.out(1.4)'});
  tl.fromTo('#options .option',{opacity:0,y:8},{opacity:1,y:0,duration:0.3,stagger:0.08,ease:'power2.out'},'-=0.25');

  gsap.fromTo('#genBtn',{scale:1},{scale:1.03,duration:0.2,yoyo:true,repeat:1,ease:'power2.out'});
  updateCount();
  track('draw',cat);
}

function pick(opt){
  document.getElementById('optA').className='option opt-a'+(opt==='a'?' picked':'');
  document.getElementById('optB').className='option opt-b'+(opt==='b'?' picked':'');
  gsap.fromTo(opt==='a'?'#optA':'#optB',{scale:0.9},{scale:1,duration:0.25,ease:'back.out(1.5)'});
  track('pick',cat,opt);
}

function shareResult(){
  if(!currentQ)return;
  const t='would you rather... '+currentQ+'\n\nPlaying Would You Rather — FTG edition. Your turn: https://wouldyourather.f--kthegame.com';
  if(navigator.share){navigator.share({title:'Would You Rather — FTG',text:t,url:'https://wouldyourather.f--kthegame.com'})}
  else{navigator.clipboard.writeText(t);showToast('Copied! Drop it in the group 👀')}
  track('share');
}

function showToast(msg){
  const el=document.getElementById('toast');el.textContent=msg;
  gsap.to(el,{opacity:1,duration:0.3,y:-10,ease:'power2.out'});
  gsap.to(el,{opacity:0,duration:0.3,delay:2,y:0,ease:'power2.in'});
}

function track(a,c,l){if(typeof gtag!=='undefined')gtag('event',a,{event_category:c,event_label:l})}
function trackCTA(){if(typeof gtag!=='undefined')gtag('event','cta_click',{event_category:'conversion',event_label:'ftg_deck'})}

document.querySelectorAll('#cats .pill').forEach(p=>p.addEventListener('click',()=>selCat(p.dataset.cat)));

window.addEventListener('DOMContentLoaded',()=>{
  const tl=gsap.timeline();
  tl.fromTo('#header',{opacity:0,y:-20},{opacity:1,y:0,duration:0.6,ease:'power3.out'});
  tl.fromTo('#cats',{opacity:0,y:12},{opacity:1,y:0,duration:0.5,ease:'power2.out'},'-=0.25');
  tl.fromTo('#counter',{opacity:0},{opacity:1,duration:0.3},'-=0.15');
  tl.fromTo('#genBtn',{opacity:0,scale:0.9,y:10},{opacity:1,scale:1,y:0,duration:0.5,ease:'back.out(1.4)'},'-=0.1');
  tl.fromTo('#cta',{opacity:0,y:10},{opacity:1,y:0,duration:0.5,ease:'power2.out'},'-=0.2');
  updateCount();
});
</script>
